<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>VoidFunction210 IT Asset Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head> 
<body> 
    <h1>ByteForge IT & Inventory Tracker</h1>
</body>
<body> 
    <div class="container">
        <h1> ByteForge IT & Inventory Tracker</h1> 

        <form id="asset-form">
            <div class="form-group">
                <label for="asset-name">Device Name (e.g., Dell XPS 13)</label>
                <input type="text" id="asset-name" required>
            </div>
            
            <div class="form-group">
                <label for="asset-type">Type</label>
                <select id="asset-type">
                    <option value="Computer">Computer</option>
                    <option value="Printer">Printer</option>
                    <option value="Router/Switch">Router/Switch</option>
                    <option value="Peripheral">Peripheral</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="asset-location">Location</label>
                <input type="text" id="asset-location" required>
            </div>

            <div class="form-group">
                <label for="asset-user">Assigned User</label>
                <input type="text" id="asset-user" placeholder="Unassigned">
            </div>

            <button type="submit">Add Asset</button>
        </form>

        <h2>Asset Inventory</h2>
        <table id="asset-table">
            <thead>
                <tr>
                    <th>Device</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Assigned User</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="asset-list">
                </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2026 Byteforge Admin. All Rights Reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
